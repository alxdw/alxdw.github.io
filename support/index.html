<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support | w5y</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        color: #fff;
        padding: 28px 18px;
      }

      .support-page {
        width: min(440px, 100%);
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        border-radius: 8px;
        border: 1px solid #333;
        text-decoration: none;
        user-select: none;
        font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-weight: 600;
        letter-spacing: 0.08em;
        font-size: 0.88rem;
        padding: 9px 11px;
        margin-bottom: 24px;
        transition: transform 150ms ease-out, box-shadow 150ms ease-out,
          border-color 150ms ease-out, background-color 150ms ease-out;
      }

      .home-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .home-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.65);
        border-color: #555;
        background-color: #050505;
      }

      .support-panel {
        background: #050505;
        border-radius: 14px;
        border: 1px solid #333;
        padding: 24px 22px 20px;
        color: #f5f5f5;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.9);
      }

      .support-title {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .support-body {
        font-size: 0.92rem;
        line-height: 1.5;
        color: #ccc;
      }

      .contact-form {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .contact-form label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.86rem;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: #9f9f9f;
      }

      .contact-form input,
      .contact-form select,
      .contact-form textarea {
        background: #050505;
        border-radius: 8px;
        border: 1px solid #333;
        padding: 9px 10px;
        color: #f5f5f5;
        font: inherit;
        min-height: 40px;
        transition: border-color 140ms ease-out, box-shadow 140ms ease-out,
          background-color 140ms ease-out;
      }

      .contact-form select {
        appearance: none;
        background-image: linear-gradient(45deg, transparent 50%, #9f9f9f 50%),
          linear-gradient(135deg, #9f9f9f 50%, transparent 50%);
        background-position: calc(100% - 17px) 17px, calc(100% - 12px) 17px;
        background-size: 5px 5px, 5px 5px;
        background-repeat: no-repeat;
        padding-right: 32px;
      }

      .contact-form textarea {
        min-height: 96px;
        resize: vertical;
      }

      .contact-form input::placeholder,
      .contact-form textarea::placeholder {
        color: #606060;
      }

      .contact-form input:focus,
      .contact-form select:focus,
      .contact-form textarea:focus {
        outline: none;
        border-color: #888;
        box-shadow: 0 0 0 1px #888;
        background-color: #080808;
      }

      .contact-form button[type="submit"] {
        margin-top: 4px;
        align-self: flex-end;
        padding: 8px 18px;
        border-radius: 999px;
        border: 1px solid #fff;
        background: #fff;
        color: #000;
        font-size: 0.84rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background-color 140ms ease-out, color 140ms ease-out,
          box-shadow 140ms ease-out, transform 120ms ease-out,
          border-color 140ms ease-out;
      }

      .contact-form button[type="submit"]:hover {
        background: #f0f0f0;
        border-color: #f0f0f0;
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.65);
      }

      .contact-form button[type="submit"]:active {
        transform: translateY(0);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
      }

      .contact-form button[type="submit"]:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="support-page">
      <a class="home-link" href="../">w5y</a>
      <section class="support-panel" aria-labelledby="supportTitle">
        <h1 class="support-title" id="supportTitle">Support</h1>
        <div class="support-body">
          <p>Drop me a note, and I’ll get back to you.</p>
          <form
            class="contact-form"
            action="https://formspree.io/f/mpwvrbng"
            method="POST"
          >
            <label>
              Which app are you getting in contact about?
              <select name="app" required>
                <option value="" disabled selected>Select an app</option>
                <option value="Frameweave">Frameweave</option>
                <option value="Homegel">Homegel</option>
              </select>
            </label>
            <label>
              Your email
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </label>
            <label>
              Your message
              <textarea
                name="message"
                placeholder="What can I help you with?"
                required
              ></textarea>
            </label>
            <button type="submit">Send</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
