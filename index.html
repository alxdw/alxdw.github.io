<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>w5y</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        color: #fff;
      }

      .logo-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: min(40vw, 200px);
        height: min(40vw, 200px);
        background: #000;
        color: #fff;
        border-radius: 12px;
        border: 1px solid #333;
        text-decoration: none;
        cursor: pointer;
        user-select: none;
        font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-weight: 600;
        letter-spacing: 0.08em;
        font-size: clamp(1.5rem, 6vw, 2.4rem);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.6);
        transition: transform 150ms ease-out, box-shadow 150ms ease-out,
          border-color 150ms ease-out, background-color 150ms ease-out;
      }

      .logo-button:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .logo-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 24px 45px rgba(0, 0, 0, 0.75);
        border-color: #555;
        background-color: #050505;
      }

      .logo-button:active {
        transform: translateY(0);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.6);
      }

    </style>
  </head>
  <body>
    <!-- Centered logo -->
    <a class="logo-button" href="support/" aria-label="Support">
      w5y
    </a>
  </body>
</html>
